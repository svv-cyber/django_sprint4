{% extends "base.html" %}
{% load django_bootstrap5 %}

{% block content %}
  <div class="row justify-content-center">
    <div class="col-md-6">
      <div class="card">
        <div class="card-header">
          <h2 class="text-center">Редактирование профиля</h2>
        </div>
        <div class="card-body">
          <form method="post">
            {% csrf_token %}
            {% bootstrap_form form %}
            <button type="submit" class="btn btn-primary w-100">Сохранить</button>
          </form>
        </div>
      </div>
    </div>
  </div>
{% endblock %}
